services:
  jellyseerr:
    image: seerr-team/seerr:latest
    container_name: jellyseerr
    init: true
    environment:
      - LOG_LEVEL=debug
      - TZ=Asia/Kathmandu
      - PORT=5055 #optional
    ports:
      - 5055:5055
    volumes:
      - ./appdata/config:/app/config:z
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - media_network

networks:
  media_network:
    external: true
