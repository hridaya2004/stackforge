services:
  jellyseerr:
    image: ghcr.io/seerr-team/seerr@sha256:b35ba0461c4a1033d117ac1e5968fd4cbe777899e4cbfbdeaf3d10a42a0eb7e9
    container_name: jellyseerr
    init: true
    environment:
      - LOG_LEVEL=debug
      - TZ=Asia/Kathmandu
      - PORT=5055 #optional
    ports:
      - 5055:5055
    volumes:
      - ./appdata/config:/app/config:z
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - media_network

networks:
  media_network:
    external: true
